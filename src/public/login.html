<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Tracker - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        
        .bitcoin-logo {
            width: 24px;
            height: 24px;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        /* PIN Keypad Styles */
        .login-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .login-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-weight: 500;
        }
        
        .login-tab.active {
            border: 1px solid var(--border-color);
            border-bottom: 2px solid var(--accent-color);
            font-weight: 700;
        }
        
        .pin-login-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        
        .pin-display {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        .pin-digit {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .pin-digit.filled {
            background-color: var(--accent-color);
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 240px;
        }
        
        .keypad-button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background-color: var(--background-color);
            color: var(--text-color);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .keypad-button:hover {
            background-color: var(--accent-color);
            color: white;
        }
        
        .keypad-button.clear {
            background-color: rgba(231, 76, 60, 0.1);
        }
        
        .keypad-button.clear:hover {
            background-color: rgba(231, 76, 60, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><img src="images/bitcoin-icon.svg" alt="Bitcoin" class="bitcoin-logo"> BTC Tracker</h1>
        </header>

        <div class="card" style="max-width: 600px; margin: 50px auto; width: 90%;">
            <h2 style="text-align: center; margin-bottom: 20px;"><i class="fas fa-sign-in-alt"></i> Login</h2>
            <div id="error-message" class="error-message" style="color: var(--loss-color); margin-bottom: 15px; text-align: center; padding: 10px; border-radius: 4px; background-color: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.3); display: none;"></div>
            
            <div class="login-tabs">
                <div class="login-tab" data-tab="pin-login">PIN Login</div>
                <div class="login-tab active" data-tab="password-login">Password Login</div>
            </div>
            
            <form action="/login" method="POST" id="password-login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" required 
                           style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background-color: var(--background-color); color: var(--text-color);">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" required
                           style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background-color: var(--background-color); color: var(--text-color);">
                </div>
                <div class="form-group" style="display: flex; align-items: center; margin: 15px 0;">
                    <div style="display: flex; align-items: center;">
                        <input type="checkbox" id="rememberMe" name="rememberMe" style="margin-right: 8px; width: 16px; height: 16px; cursor: pointer;" title="Stay logged in for 30 days">
                        <label for="rememberMe" style="color: var(--text-secondary-color); cursor: pointer; margin: 0;">Remember me</label>
                    </div>
                </div>
                <button type="submit" class="btn-primary" 
                        style="width: 100%; padding: 12px; background-color: var(--accent-color); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div id="pin-login-container" class="pin-login-container">
                <p id="pin-username-display" style="font-size: 18px; font-weight: 600; margin-bottom: 10px;"></p>
                
                <div class="pin-display">
                    <div class="pin-digit" id="pin-digit-1"></div>
                    <div class="pin-digit" id="pin-digit-2"></div>
                    <div class="pin-digit" id="pin-digit-3"></div>
                    <div class="pin-digit" id="pin-digit-4"></div>
                </div>
                
                <div class="keypad">
                    <button class="keypad-button" data-value="1">1</button>
                    <button class="keypad-button" data-value="2">2</button>
                    <button class="keypad-button" data-value="3">3</button>
                    <button class="keypad-button" data-value="4">4</button>
                    <button class="keypad-button" data-value="5">5</button>
                    <button class="keypad-button" data-value="6">6</button>
                    <button class="keypad-button" data-value="7">7</button>
                    <button class="keypad-button" data-value="8">8</button>
                    <button class="keypad-button" data-value="9">9</button>
                    <button class="keypad-button clear" data-value="clear"><i class="fas fa-backspace"></i></button>
                    <button class="keypad-button" data-value="0">0</button>
                    <button class="keypad-button" data-value="submit"><i class="fas fa-check"></i></button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="https://github.com/wilqq-the/btc-tracker" class="github-link" target="_blank"><i class="fab fa-github"></i> GitHub</a>
            <a href="https://github.com/wilqq-the" target="_blank"><i class="fas fa-user"></i> wilqq-the</a>
            <a href="https://github.com/wilqq-the/btc-tracker/issues" target="_blank"><i class="fas fa-bug"></i> Issues</a>
            <a href="#" class="donation-link" id="donationLink"><i class="fab fa-bitcoin"></i> Donate</a>
        </div>
        <div class="donation-tooltip" id="donationTooltip">
            <div class="donation-content">
                <h3><i class="fab fa-bitcoin"></i> Support BTC Tracker</h3>
                <div class="donation-address">
                    <p>BTC Address:</p>
                    <div class="address-container">
                        <code id="btcAddress">bc1qn058nln055rkvpnxvkk5qmv9j0ma9eg79a79ef</code>
                        <button onclick="copyAddress()" title="Copy address">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
                <div class="qr-container">
                    <div id="qrcode"></div>
                </div>
            </div>
        </div>
        <div class="license">© <span id="current-year">2023</span> BTC Tracker. Released under the MIT License.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        // Set current year in footer
        document.getElementById('current-year').textContent = new Date().getFullYear();
        
        // Check for error parameter in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = decodeURIComponent(urlParams.get('error'));
            errorElement.style.display = 'block';
            
            // Shake the error message for attention
            errorElement.classList.add('shake');
            setTimeout(() => {
                errorElement.classList.remove('shake');
            }, 500);
        }
        
        // Tab switching between password and PIN login
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.login-tab');
            const passwordForm = document.getElementById('password-login-form');
            const pinContainer = document.getElementById('pin-login-container');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    const tabId = tab.getAttribute('data-tab');
                    
                    if (tabId === 'password-login') {
                        passwordForm.style.display = 'block';
                        pinContainer.style.display = 'none';
                    } else {
                        passwordForm.style.display = 'none';
                        pinContainer.style.display = 'flex';
                    }
                });
            });
            
            // Auto-fill username and check if PIN is available
            fetchDefaultUsername();
            
            // Set up keypad functionality
            setupPinKeypad();
            
            // Auto-focus PIN input in Electron environment
            setTimeout(() => {
                const isElectron = window.navigator.userAgent.toLowerCase().indexOf('electron') > -1;
                if (isElectron) {
                    document.querySelector('.keypad-button[data-value="1"]').focus();
                }
            }, 500);
        });
        
        // PIN login functionality
        let currentPin = '';
        
        function setupPinKeypad() {
            const keypadButtons = document.querySelectorAll('.keypad-button');
            const pinDigits = document.querySelectorAll('.pin-digit');
            
            keypadButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const value = button.getAttribute('data-value');
                    
                    if (value === 'clear') {
                        // Clear last digit
                        if (currentPin.length > 0) {
                            currentPin = currentPin.slice(0, -1);
                            updatePinDisplay();
                        }
                    } else if (value === 'submit') {
                        // Submit PIN if complete
                        if (currentPin.length === 4) {
                            submitPin();
                        }
                    } else {
                        // Add digit if not full
                        if (currentPin.length < 4) {
                            currentPin += value;
                            updatePinDisplay();
                            
                            // Auto-submit when 4 digits entered
                            if (currentPin.length === 4) {
                                setTimeout(submitPin, 300);
                            }
                        }
                    }
                });
            });
            
            // Allow keyboard input for PIN
            document.addEventListener('keydown', (e) => {
                // Only process if PIN login is visible
                if (document.getElementById('pin-login-container').style.display !== 'flex') {
                    return;
                }
                
                if (e.key >= '0' && e.key <= '9') {
                    // Digit pressed
                    if (currentPin.length < 4) {
                        currentPin += e.key;
                        updatePinDisplay();
                        
                        // Auto-submit when 4 digits entered
                        if (currentPin.length === 4) {
                            setTimeout(submitPin, 300);
                        }
                    }
                } else if (e.key === 'Backspace') {
                    // Backspace pressed
                    if (currentPin.length > 0) {
                        currentPin = currentPin.slice(0, -1);
                        updatePinDisplay();
                    }
                } else if (e.key === 'Enter') {
                    // Enter pressed
                    if (currentPin.length === 4) {
                        submitPin();
                    }
                }
            });
        }
        
        function updatePinDisplay() {
            const pinDigits = document.querySelectorAll('.pin-digit');
            
            pinDigits.forEach((digit, index) => {
                if (index < currentPin.length) {
                    digit.textContent = '•';
                    digit.classList.add('filled');
                } else {
                    digit.textContent = '';
                    digit.classList.remove('filled');
                }
            });
        }
        
        async function submitPin() {
            const username = document.getElementById('pin-username-display').textContent;
            console.log('Submitting PIN for user:', username);
            
            try {
                console.log('Sending PIN login request to /pin-login');
                const response = await fetch('/pin-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        pin: currentPin
                    })
                });
                
                console.log('PIN login response status:', response.status);
                
                // Log the raw response text for debugging
                const responseText = await response.text();
                console.log('Raw PIN login response:', responseText);
                
                // Parse as JSON after logging the raw text
                const data = responseText ? JSON.parse(responseText) : {};
                
                if (data.success) {
                    window.location.href = data.redirectUrl || '/';
                } else {
                    // Show error and clear PIN
                    const errorElement = document.getElementById('error-message');
                    errorElement.textContent = data.message || 'Invalid PIN';
                    errorElement.style.display = 'block';
                    
                    // Shake the error message
                    errorElement.classList.add('shake');
                    setTimeout(() => {
                        errorElement.classList.remove('shake');
                    }, 500);
                    
                    // Clear PIN
                    currentPin = '';
                    updatePinDisplay();
                }
            } catch (error) {
                console.error('Error during PIN login:', error);
                
                // Show error
                const errorElement = document.getElementById('error-message');
                errorElement.textContent = 'Error during login: ' + error.message;
                errorElement.style.display = 'block';
                
                // Clear PIN
                currentPin = '';
                updatePinDisplay();
            }
        }
        
        // Fetch default username for auto-fill
        async function fetchDefaultUsername() {
            try {
                console.log('Attempting to fetch default username from /api/default-username');
                
                // Use full URL path to avoid 404 errors
                const response = await fetch('/api/default-username');
                console.log('Response status:', response.status);
                
                // Log the raw response text for debugging
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                // Parse as JSON after logging the raw text
                const data = JSON.parse(responseText);
                
                if (data.username) {
                    // Auto-fill username field
                    document.getElementById('username').value = data.username;
                    document.getElementById('pin-username-display').textContent = data.username;
                    
                    // Show/hide PIN login tab based on whether PIN is enabled
                    const pinTab = document.querySelector('.login-tab[data-tab="pin-login"]');
                    const passwordTab = document.querySelector('.login-tab[data-tab="password-login"]');
                    
                    if (data.hasPinEnabled) {
                        pinTab.style.display = 'block';
                        
                        // Always select PIN login when it's available
                        pinTab.classList.add('active');
                        passwordTab.classList.remove('active');
                        
                        // Switch to PIN login tab
                        document.getElementById('password-login-form').style.display = 'none';
                        document.getElementById('pin-login-container').style.display = 'flex';
                    } else {
                        pinTab.style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('Error fetching default username:', error);
                // Show a message in the UI for debugging
                const errorElement = document.getElementById('error-message');
                errorElement.textContent = 'Error loading user data: ' + error.message;
                errorElement.style.display = 'block';
            }
        }
        
        // Check if user has a saved theme preference
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            }
        });

        function generateQRCode() {
            const address = document.getElementById('btcAddress').textContent;
            const qrcodeDiv = document.getElementById('qrcode');
            
            // Clear any existing QR code
            qrcodeDiv.innerHTML = '';
            
            // Create a canvas element
            const canvas = document.createElement('canvas');
            qrcodeDiv.appendChild(canvas);
            
            // Get current theme
            const isLightTheme = document.body.classList.contains('light-theme');
            
            // Generate QR code
            QRCode.toCanvas(canvas, address, {
                width: 150,
                margin: 1,
                color: {
                    dark: isLightTheme ? '#000000' : '#ffffff',
                    light: isLightTheme ? '#ffffff' : '#000000'
                }
            }, function (error) {
                if (error) {
                    console.error('Error generating QR code:', error);
                    qrcodeDiv.innerHTML = '<p style="color: var(--error-color, red);">Failed to generate QR code</p>';
                }
            });
        }

        function copyAddress() {
            const address = document.getElementById('btcAddress').textContent;
            navigator.clipboard.writeText(address).then(() => {
                const button = event.currentTarget;
                const originalIcon = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => {
                    button.innerHTML = originalIcon;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy address:', err);
                alert('Failed to copy address. Please try again.');
            });
        }

        // Handle donation tooltip
        document.addEventListener('DOMContentLoaded', () => {
            const donationLink = document.getElementById('donationLink');
            const donationTooltip = document.getElementById('donationTooltip');

            // Generate QR code once when page loads
            generateQRCode();

            let tooltipTimeout;

            donationLink.addEventListener('mouseenter', () => {
                clearTimeout(tooltipTimeout);
                donationTooltip.classList.add('show');
            });

            donationLink.addEventListener('mouseleave', () => {
                tooltipTimeout = setTimeout(() => {
                    donationTooltip.classList.remove('show');
                }, 200);
            });

            // Prevent tooltip from closing when hovering over it
            donationTooltip.addEventListener('mouseenter', () => {
                clearTimeout(tooltipTimeout);
                donationTooltip.classList.add('show');
            });

            donationTooltip.addEventListener('mouseleave', () => {
                tooltipTimeout = setTimeout(() => {
                    donationTooltip.classList.remove('show');
                }, 200);
            });
        });
    </script>
</body>
</html>
