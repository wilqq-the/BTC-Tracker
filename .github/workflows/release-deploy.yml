name: Deploy - Release

on:
  push:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  deploy-docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run full test suite
      run: |
        npx prisma generate
        npx prisma db push --force-reset
        npm run test:ci -- --runInBand --coverage
      env:
        CI: true
        NODE_ENV: test
        DATABASE_URL: "file:./test.db"
        NEXTAUTH_SECRET: "test-secret-key-for-jest-testing-only"
        NEXTAUTH_URL: "http://localhost:3000"

    - name: Build application
      run: npm run build
      env:
        DATABASE_URL: "file:./prisma/build.db"
        NEXTAUTH_SECRET: "build-time-secret-not-used-in-production"
        NEXTAUTH_URL: "http://localhost:3000"
        NODE_ENV: production

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract version info
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
        fi
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image (release)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        no-cache: true
        provenance: false
        sbom: false
        platforms: linux/amd64,linux/arm64
        tags: |
          thewilqq/btc-tracker:latest
          thewilqq/btc-tracker:${{ steps.version.outputs.version }}
          thewilqq/btc-tracker:stable
        labels: |
          org.opencontainers.image.title=BTC Tracker
          org.opencontainers.image.description=Self-hosted Bitcoin portfolio tracker
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ steps.version.outputs.date }}
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.url=https://hub.docker.com/r/thewilqq/btc-tracker
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
          BUILD_DATE=${{ steps.version.outputs.date }}
          COMMIT_SHA=${{ steps.version.outputs.sha_short }}

    - name: Create deployment summary
      run: |
        echo "## Release Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker Tags**: latest, stable, ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
        echo "- **Registry**: https://hub.docker.com/r/thewilqq/btc-tracker" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ steps.version.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY

    - name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: thewilqq/btc-tracker
        short-description: "Self-hosted Bitcoin portfolio tracker with multi-user support"

  build-electron:
    runs-on: windows-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        env:
          DATABASE_URL: "file:./build-dummy.db"
          NEXTAUTH_SECRET: "build-secret-not-used-at-runtime"
        run: npm run build

      - name: Prepare standalone bundle
        run: |
          Copy-Item -Path ".next/static" -Destination ".next/standalone/.next/static" -Recurse -Force
          Copy-Item -Path "public" -Destination ".next/standalone/public" -Recurse -Force
          if (!(Test-Path ".next/standalone/node_modules/.prisma")) {
            Copy-Item -Path "node_modules/.prisma" -Destination ".next/standalone/node_modules/.prisma" -Recurse -Force
          }
          if (!(Test-Path ".next/standalone/node_modules/@prisma")) {
            Copy-Item -Path "node_modules/@prisma" -Destination ".next/standalone/node_modules/@prisma" -Recurse -Force
          }
        shell: pwsh

      - name: Trim standalone bundle
        run: |
          $standalone = ".next/standalone"
          $patterns = @("README.md", "README", "CHANGELOG.md", "CHANGELOG", "LICENSE", "LICENSE.md", "*.map", "*.ts", "!*.d.ts", "*.md", ".npmignore", ".eslintrc*", ".prettierrc*", "tsconfig.json", "jest.config.*", ".github", "__tests__", "test", "tests", "docs", "doc", "example", "examples")
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path "$standalone/node_modules" -Recurse -Filter $pattern -ErrorAction SilentlyContinue |
              Where-Object { -not $_.PSIsContainer -or $_.Name -in @(".github", "__tests__", "test", "tests", "docs", "doc", "example", "examples") } |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
          $sizeMB = [math]::Round((Get-ChildItem $standalone -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "Standalone bundle size after trim: ${sizeMB} MB"
        shell: pwsh

      - name: Collect Prisma CLI dependencies
        run: node scripts/collect-prisma-deps.js node_modules prisma-bundle

      - name: Install Electron and builder
        run: npm install --save-dev electron@latest electron-builder@latest

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --config electron-builder.yml

      - name: Verify packaged output
        run: |
          $resDir = "dist-electron/win-unpacked/resources"
          $appDir = "$resDir/app"
          if (Test-Path "$appDir/.next/standalone/node_modules/next") { Write-Host "next module: OK" } else { Write-Error "next module missing!"; exit 1 }
          if (Test-Path "$resDir/prisma/schema.prisma") { Write-Host "prisma schema: OK" } else { Write-Error "prisma schema missing!"; exit 1 }
          if (Test-Path "$resDir/prisma-cli/node_modules/prisma/build/index.js") { Write-Host "prisma CLI: OK" } else { Write-Error "prisma CLI missing!"; exit 1 }
          $sizeMB = [math]::Round((Get-ChildItem "dist-electron/win-unpacked" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "Total unpacked size: ${sizeMB} MB"
        shell: pwsh

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist-electron/*.exe --clobber
