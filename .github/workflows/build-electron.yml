name: Build Electron App

on:
  push:
    branches:
      - feature/electron-desktop
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        env:
          DATABASE_URL: "file:./build-dummy.db"
          NEXTAUTH_SECRET: "build-secret-not-used-at-runtime"
        run: npm run build

      - name: Prepare standalone bundle
        run: |
          Copy-Item -Path ".next/static" -Destination ".next/standalone/.next/static" -Recurse -Force
          Copy-Item -Path "public" -Destination ".next/standalone/public" -Recurse -Force
          if (!(Test-Path ".next/standalone/node_modules/.prisma")) {
            Copy-Item -Path "node_modules/.prisma" -Destination ".next/standalone/node_modules/.prisma" -Recurse -Force
          }
          if (!(Test-Path ".next/standalone/node_modules/@prisma")) {
            Copy-Item -Path "node_modules/@prisma" -Destination ".next/standalone/node_modules/@prisma" -Recurse -Force
          }
          Write-Host "--- standalone contents ---"
          Get-ChildItem ".next/standalone" -Depth 0 | ForEach-Object { Write-Host $_.Name }
          Write-Host "--- node_modules (first 20) ---"
          Get-ChildItem ".next/standalone/node_modules" -Depth 0 | Select-Object -First 20 | ForEach-Object { Write-Host $_.Name }
        shell: pwsh

      - name: Install Electron and builder
        run: npm install --save-dev electron@latest electron-builder@latest

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --config electron-builder.yml

      - name: Verify packaged output
        run: |
          $appDir = "dist-electron/win-unpacked/resources/app"
          if (Test-Path "$appDir/.next/standalone/node_modules/next") {
            Write-Host "next module: OK"
          } else {
            Write-Error "next module missing from packaged app!"
            Get-ChildItem "$appDir" -Depth 1 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
        shell: pwsh

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: BTC-Tracker-Windows-Setup
          path: dist-electron/*.exe
          retention-days: 14
