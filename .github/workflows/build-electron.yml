name: Build Electron App

on:
  push:
    branches:
      - feature/electron-desktop
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        env:
          DATABASE_URL: "file:./build-dummy.db"
          NEXTAUTH_SECRET: "build-secret-not-used-at-runtime"
        run: npm run build

      - name: Verify standalone output
        run: |
          if (!(Test-Path ".next/standalone/server.js")) {
            Write-Error "Next.js standalone output not found!"
            exit 1
          }
          Write-Host "Standalone server.js found"
          Write-Host "--- standalone root ---"
          Get-ChildItem ".next/standalone" -Depth 0 | ForEach-Object { Write-Host $_.Name }
          Write-Host "--- standalone node_modules (top-level) ---"
          Get-ChildItem ".next/standalone/node_modules" -Depth 0 -ErrorAction SilentlyContinue | Select-Object -First 20 | ForEach-Object { Write-Host $_.Name }
          if (!(Test-Path ".next/standalone/node_modules/next")) {
            Write-Error "next module missing from standalone!"
            exit 1
          }
          Write-Host "next module present in standalone"
        shell: pwsh

      - name: Copy Prisma engines to standalone
        run: |
          # Prisma query engine must be available in the standalone bundle
          $prismaEngines = Get-ChildItem -Path "node_modules/.prisma" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($prismaEngines) {
            foreach ($engine in $prismaEngines) {
              Write-Host "Found Prisma engine: $($engine.FullName)"
            }
          }
          # Also copy the prisma client to standalone node_modules
          $standalonePrisma = ".next/standalone/node_modules/.prisma"
          if (!(Test-Path $standalonePrisma)) {
            Write-Host "Copying .prisma to standalone..."
            Copy-Item -Path "node_modules/.prisma" -Destination $standalonePrisma -Recurse -Force
          }
          $standalonePrismaClient = ".next/standalone/node_modules/@prisma"
          if (!(Test-Path $standalonePrismaClient)) {
            Write-Host "Copying @prisma to standalone..."
            Copy-Item -Path "node_modules/@prisma" -Destination $standalonePrismaClient -Recurse -Force
          }
        shell: pwsh

      - name: Install Electron and builder
        run: npm install --save-dev electron@latest electron-builder@latest

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --config electron-builder.yml

      - name: Verify packaged resources
        run: |
          $resourceDir = "dist-electron/win-unpacked/resources/nextjs-standalone"
          Write-Host "--- packaged standalone root ---"
          Get-ChildItem $resourceDir -Depth 0 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
          Write-Host "--- packaged standalone node_modules ---"
          Get-ChildItem "$resourceDir/node_modules" -Depth 0 -ErrorAction SilentlyContinue | Select-Object -First 20 | ForEach-Object { Write-Host $_.Name }
          if (!(Test-Path "$resourceDir/node_modules/next")) {
            Write-Error "next module missing from packaged app!"
            exit 1
          }
          Write-Host "Packaged resources look good"
        shell: pwsh

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: BTC-Tracker-Windows-Setup
          path: dist-electron/*.exe
          retention-days: 14

      - name: Upload unpacked (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: BTC-Tracker-Windows-Unpacked
          path: dist-electron/win-unpacked
          retention-days: 7
