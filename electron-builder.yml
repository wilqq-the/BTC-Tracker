appId: com.btctracker.app
productName: BTC Tracker
copyright: Copyright (c) 2024-2026 wilqq-the

directories:
  output: dist-electron

npmRebuild: false
asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/.prisma/**/*"
  - "**/node_modules/@prisma/engines/**/*"

files:
  - electron/**/*
  - .next/standalone/**/*
  - "!.next/standalone/node_modules/electron"
  - "!.next/standalone/node_modules/electron-builder"

extraResources:
  - from: prisma/schema.prisma
    to: prisma/schema.prisma
  - from: prisma/migrations
    to: prisma/migrations
    filter:
      - "**/*"
  - from: node_modules/prisma
    to: prisma-cli
    filter:
      - "**/*"
  - from: node_modules/@prisma/engines
    to: prisma-engines
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BTC Tracker

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.finance

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Finance
